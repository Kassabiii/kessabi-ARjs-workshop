<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>GeoAR.js demo</title>
    <script src='https://aframe.io/releases/0.9.2/aframe.min.js'></script>
    <script src="https://raw.githack.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
    <script>
        THREEx.ArToolkitContext.baseURL = 'https://raw.githack.com/jeromeetienne/ar.js/master/three.js/'
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        #overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: #0f0f1a;
            display: flex; flex-direction: column;
        }

        #map { flex: 1; }

        #map-panel {
            background: #1a1a2e;
            border-top: 1px solid #2d2d4e;
            padding: 1rem 1.5rem;
            display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
            font-family: 'Segoe UI', sans-serif;
        }

        #map-panel p { color: #6b7280; font-size: 0.9rem; flex: 1; min-width: 180px; }
        #coords-display { color: #a78bfa !important; font-weight: 600; }

        #launch-ar {
            background: #a78bfa; color: #0f0f1a; border: none; border-radius: 8px;
            padding: 0.6rem 1.4rem; font-size: 0.95rem; font-weight: 700;
            cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
        }
        #launch-ar:disabled { opacity: 0.35; cursor: not-allowed; }

        #size-hint {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.65); color: #e0e0f0;
            border-radius: 8px; padding: 0.4rem 1rem;
            font-family: 'Segoe UI', sans-serif; font-size: 0.8rem;
            z-index: 9998; pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body style='margin: 0; overflow: hidden;'>

    <div id="overlay">
        <div id="map"></div>
        <div id="map-panel">
            <p>Click the map to place your AR target</p>
            <p id="coords-display">No location selected</p>
            <button id="launch-ar" disabled>Launch AR</button>
        </div>
    </div>

    <div id="size-hint">Ctrl + Scroll to resize the satellite</div>

    <script>
        const res = JSON.parse(localStorage.getItem('arResolution') || '{"w":1280,"h":720}');

        const map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let marker = null;
        let pickedLat = null, pickedLng = null;

        map.on('click', (e) => {
            pickedLat = e.latlng.lat;
            pickedLng = e.latlng.lng;
            if (marker) marker.setLatLng(e.latlng);
            else marker = L.marker(e.latlng).addTo(map);
            document.getElementById('coords-display').textContent =
                `Lat: ${pickedLat.toFixed(5)}, Lng: ${pickedLng.toFixed(5)}`;
            document.getElementById('launch-ar').disabled = false;
        });

        document.getElementById('launch-ar').addEventListener('click', () => {
            const scene = document.createElement('a-scene');
            scene.setAttribute('vr-mode-ui', 'enabled: false');
            scene.setAttribute('embedded', '');
            scene.setAttribute('arjs',
                `sourceType: webcam; sourceWidth: ${res.w}; sourceHeight: ${res.h}; displayWidth: ${res.w}; displayHeight: ${res.h}; debugUIEnabled: false;`
            );

            const entity = document.createElement('a-entity');
            entity.setAttribute('gltf-model', 'saturn-orbiter.gltf');
            entity.setAttribute('rotation', '0 180 0');
            entity.setAttribute('scale', '0.15 0.15 0.15');
            entity.setAttribute('gps-entity-place', `latitude: ${pickedLat}; longitude: ${pickedLng};`);
            entity.setAttribute('animation-mixer', '');
            scene.appendChild(entity);

            const camera = document.createElement('a-camera');
            camera.setAttribute('gps-camera', '');
            camera.setAttribute('rotation-reader', '');
            scene.appendChild(camera);

            document.body.appendChild(scene);
            document.getElementById('overlay').style.display = 'none';

            // Auto-hide size hint after 5s
            const hint = document.getElementById('size-hint');
            setTimeout(() => { hint.style.opacity = '0'; }, 5000);
            setTimeout(() => { hint.style.display = 'none'; }, 5600);

            // Ctrl + Scroll to resize
            let scale = 0.15;
            window.addEventListener('wheel', (e) => {
                if (!e.ctrlKey) return;
                e.preventDefault();
                const delta = e.deltaY < 0 ? 0.01 : -0.01;
                scale = Math.max(0.01, Math.min(5, scale + delta));
                entity.setAttribute('scale', `${scale} ${scale} ${scale}`);
            }, { passive: false });
        });
    </script>
</body>
</html>
